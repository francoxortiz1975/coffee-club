name: Supabase Keep-Alive

on:
  schedule:
    # Corre cada lunes a las 12:00 UTC (bien dentro de la ventana de 7 días)
    - cron: '0 12 * * 1'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "URL configurada: ${SUPABASE_URL:+sí}${SUPABASE_URL:-NO}"
          echo "KEY configurada: ${SUPABASE_ANON_KEY:+sí}${SUPABASE_ANON_KEY:-NO}"
          curl -v --fail \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            && echo "Supabase activo ✓" \
            || echo "Advertencia: no se pudo conectar a Supabase"

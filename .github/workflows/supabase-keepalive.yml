name: Supabase Keep-Alive

on:
  schedule:
    # Corre cada lunes a las 12:00 UTC (bien dentro de la ventana de 7 días)
    - cron: '0 12 * * 1'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          for i in 1 2 3; do
            echo "Intento $i..."
            if curl -s --fail \
              "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY"; then
              echo "Supabase activo ✓"
              exit 0
            fi
            echo "Falló, esperando 30s..."
            sleep 30
          done
          echo "Supabase no respondió después de 3 intentos"
          exit 1

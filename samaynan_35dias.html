<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samayñan · Plan 35 días</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F0E8; color: #2C2C2A; min-height: 100vh; }
  header { background: #2C2C2A; color: #F5F0E8; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.5px; }
  header span { font-size: 13px; opacity: 0.7; }
  .progress-bar { height: 3px; background: #444; }
  .progress-fill { height: 3px; background: #C0DD97; transition: width 0.3s; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  .phase { margin-bottom: 24px; }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #2C2C2A; color: #F5F0E8; border-radius: 10px; cursor: pointer; user-select: none; margin-bottom: 8px; }
  .phase-header h2 { font-size: 14px; font-weight: 500; flex: 1; }
  .phase-header .range { font-size: 11px; opacity: 0.6; }
  .phase-header .ph-count { font-size: 11px; opacity: 0.7; }
  .phase-header .chevron { font-size: 12px; opacity: 0.6; transition: transform 0.2s; }
  .phase-header.open .chevron { transform: rotate(180deg); }
  .phase-body { display: none; flex-direction: column; gap: 6px; }
  .phase-body.open { display: flex; }

  .day { background: #fff; border-radius: 10px; border: 0.5px solid #D3D1C7; overflow: hidden; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; }
  .day-num { font-size: 12px; font-weight: 500; color: #5F5E5A; min-width: 44px; }
  .day-label { font-size: 12px; color: #888780; flex: 1; }
  .day-prog { font-size: 11px; color: #888780; }
  .day-tasks { display: none; padding: 0 14px 12px; flex-direction: column; gap: 6px; }
  .day-tasks.open { display: flex; }

  .task { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid #F1EFE8; }
  .task:last-child { border-bottom: none; }
  .task input[type=checkbox] { margin-top: 3px; flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; accent-color: #639922; }
  .task label { font-size: 13px; line-height: 1.5; cursor: pointer; flex: 1; }
  .task.done label { text-decoration: line-through; color: #B4B2A9; }
  .badge { display: inline-block; font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 20px; margin-right: 5px; vertical-align: 1px; flex-shrink: 0; }
  .badge-DEV { background: #EEEDFE; color: #3C3489; }
  .badge-TIK { background: #FAECE7; color: #712B13; }
  .badge-DES { background: #FAEEDA; color: #633806; }
  .badge-KEY { background: #2C2C2A; color: #F5F0E8; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .sum-card { background: #fff; border-radius: 10px; border: 0.5px solid #D3D1C7; padding: 14px; text-align: center; }
  .sum-card .num { font-size: 24px; font-weight: 500; color: #2C2C2A; }
  .sum-card .lbl { font-size: 11px; color: #888780; margin-top: 2px; }

  .reset-btn { background: none; border: 0.5px solid #D3D1C7; border-radius: 6px; padding: 6px 12px; font-size: 12px; color: #888780; cursor: pointer; margin-top: 24px; }
  .reset-btn:hover { background: #F1EFE8; }
</style>
</head>
<body>

<header>
  <h1>Samayñan · 35 días</h1>
  <span id="header-prog">0 / 0 tareas</span>
</header>
<div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

<div class="container">
  <div class="summary">
    <div class="sum-card"><div class="num" id="s-done">0</div><div class="lbl">completadas</div></div>
    <div class="sum-card"><div class="num" id="s-total">0</div><div class="lbl">total tareas</div></div>
    <div class="sum-card"><div class="num" id="s-pct">0%</div><div class="lbl">progreso</div></div>
  </div>
  <div id="plan"></div>
  <button class="reset-btn" onclick="resetAll()">Reiniciar progreso</button>
</div>

<script>

      { d:'Día 19', label:'"Así se ve la app en mi teléfono"', tasks:[
        {r:'KEY',t:'PUBLICAR video 19 — demo real de la app instalada en el teléfono'},
        {r:'DEV',t:'Deploy V1 final en Vercel — URL limpia y estable'},
        {r:'DES',t:'Verificar que todo se ve bien en producción desde el móvil'},
      ]},
      { d:'Día 20', label:'Cuarta cafetería + Supabase', tasks:[
        {r:'KEY',t:'IR al Centro Histórico — cuarta cafetería'},
        {r:'TIK',t:'Filmar video 20 con más soltura — ya tienes ritmo'},
        {r:'DEV',t:'Crear cuenta en Supabase — explorar dashboard, crear proyecto'},
      ]},
      { d:'Día 21', label:'"La beta abre pronto"', tasks:[

  },

        {r:'DES',t:'Pulir diseños V2 con los coleccionables'},
      ]},
      { d:'Día 24', label:'Google OAuth', tasks:[

        {r:'DEV',t:'npm install @supabase/supabase-js — conectar al proyecto'},
        {r:'DEV',t:'Implementar Google OAuth: supabase.auth.signInWithOAuth'},
      ]},
      { d:'Día 25', label:'BETA ABIERTA', tasks:[
        {r:'KEY',t:'PUBLICAR video 25 — "la beta está abierta" · link en bio'},
        {r:'DEV',t:'Pantalla de perfil básica: mostrar foto y nombre de Google'},
        {r:'DES',t:'Preparar assets de launch: imagen anuncio + story de countdown'},
      ]},
      { d:'Día 26', label:'Primeros usuarios reales', tasks:[

        {r:'DEV',t:'Implementar "marcar como visitado" — primera colección funcionando'},
        {r:'DEV',t:'Guardar visitas en tabla visits de Supabase'},
      ]},
      { d:'Día 27', label:'Feedback real', tasks:[
        {r:'KEY',t:'PUBLICAR video 27 — feedback real + qué cambiarías con honestidad'},
        {r:'DEV',t:'Fix de bugs encontrados por usuarios beta reales'},
        {r:'DES',t:'Ajustes de diseño basados en feedback — solo los críticos'},
      ]},
      { d:'Día 28', label:'"Mañana es el día"', tasks:[
        {r:'KEY',t:'PUBLICAR video 28 — máxima anticipación "mañana lanzamos"'},
        {r:'DEV',t:'Último deploy — V1 + auth + colección funcionando'},

    ]
  },
  {
    id:'launch', label:'Lanzamiento', range:'Días 29 → 30',
    days:[
      { d:'Día 29', label:'Pre-launch', tasks:[
        {r:'KEY',t:'PUBLICAR video 29 — el video de anticipación más importante'},
        {r:'DEV',t:'Monitorear Supabase + Vercel activamente — nada debe caerse'},
        {r:'DES',t:'Último repaso de todo lo visual — nada roto en producción'},
      ]},
      { d:'Día 30', label:'LAUNCH DAY 🚀', tasks:[
        {r:'KEY',t:'PUBLICAR el video más importante de los 30 días — LAUNCH'},
        {r:'TIK',t:'Publicar también en Instagram Reels y Stories simultáneamente'},
        {r:'DEV',t:'V1 live, monitoring activo todo el día'},
        {r:'DES',t:'Documentar el sistema de diseño final — base para V2'},
      ]},
    ]
  }
];

const STORAGE_KEY = 'samaynan_35dias_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let openPhases = { pre:true, s1:false, s2:false, s3:false, s4:false, launch:false };
let openDays = {};

function allTasks() {
  let all = [];
  PHASES.forEach(function(ph) {
    ph.days.forEach(function(day) {
      day.tasks.forEach(function(t, ti) {
        all.push(ph.id + '_' + day.d + '_' + ti);
      });
    });
  });
  return all;
}

function updateSummary() {
  const all = allTasks();
  const done = all.filter(function(k){ return state[k]; }).length;
  const pct = all.length > 0 ? Math.round((done/all.length)*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('header-prog').textContent = done + ' / ' + all.length + ' tareas';
  document.getElementById('prog-fill').style.width = pct + '%';
}

function toggleTask(key) {
  state[key] = !state[key];
  saveState(state);
  const lbl = document.querySelector('label[for="' + key + '"]');
  const cb = document.getElementById(key);
  if (lbl) lbl.parentElement.classList.toggle('done', state[key]);
  if (cb) cb.checked = state[key];
  updateDayProg(key.split('_').slice(0,2).join('_'));
  updateSummary();
}

function updateDayProg(dayKey) {
  const el = document.getElementById('dp_' + dayKey.replace(/[^a-zA-Z0-9]/g,'_'));
  if (!el) return;
  const all = Object.keys(state).filter(function(k){ return k.startsWith(dayKey) && !k.includes('undefined'); });
  const done = all.filter(function(k){ return state[k]; }).length;
  el.textContent = done + '/' + all.length;
}

function togglePhase(id) {
  openPhases[id] = !openPhases[id];
  const body = document.getElementById('pb_' + id);
  const hdr = document.getElementById('ph_' + id);
  if (body) body.classList.toggle('open', openPhases[id]);
  if (hdr) hdr.classList.toggle('open', openPhases[id]);
  const ch = document.getElementById('ch_' + id);
  if (ch) ch.textContent = openPhases[id] ? '▲' : '▼';
}

function toggleDay(key) {
  openDays[key] = !openDays[key];
  const body = document.getElementById('db_' + key.replace(/[^a-zA-Z0-9]/g,'_'));
  if (body) body.classList.toggle('open', openDays[key]);
}

function resetAll() {
  if (!confirm('¿Reiniciar todo el progreso?')) return;
  state = {};
  saveState(state);
  document.querySelectorAll('input[type=checkbox]').forEach(function(cb){ cb.checked = false; });
  document.querySelectorAll('.task').forEach(function(t){ t.classList.remove('done'); });
  document.querySelectorAll('[id^=dp_]').forEach(function(el){
    const parts = el.id.replace('dp_','').split('_');
    el.textContent = '0/' + el.dataset.total;
  });
  updateSummary();
}

function render() {
  const container = document.getElementById('plan');
  let html = '';

  PHASES.forEach(function(ph) {
    let phTotal = 0, phDone = 0;
    ph.days.forEach(function(day) {
      day.tasks.forEach(function(t, ti) {
        const key = ph.id + '_' + day.d + '_' + ti;
        phTotal++;
        if (state[key]) phDone++;
      });
    });

    html += '<div class="phase">';
    html += '<div class="phase-header' + (openPhases[ph.id] ? ' open' : '') + '" id="ph_' + ph.id + '" onclick="togglePhase(\'' + ph.id + '\')">';
    html += '<h2>' + ph.label + '</h2>';
    html += '<span class="range">' + ph.range + '</span>';
    html += '<span class="ph-count">' + phDone + '/' + phTotal + '</span>';
    html += '<span class="chevron" id="ch_' + ph.id + '">' + (openPhases[ph.id] ? '▲' : '▼') + '</span>';
    html += '</div>';
    html += '<div class="phase-body' + (openPhases[ph.id] ? ' open' : '') + '" id="pb_' + ph.id + '">';

    ph.days.forEach(function(day) {
      const dayKey = ph.id + '_' + day.d;
      const safeKey = dayKey.replace(/[^a-zA-Z0-9]/g,'_');
      const dayDone = day.tasks.filter(function(t,ti){ return state[ph.id + '_' + day.d + '_' + ti]; }).length;

      html += '<div class="day">';
      html += '<div class="day-header" onclick="toggleDay(\'' + dayKey + '\')">';
      html += '<span class="day-num">' + day.d + '</span>';
      html += '<span class="day-label">' + day.label + '</span>';
      html += '<span class="day-prog" id="dp_' + safeKey + '" data-total="' + day.tasks.length + '">' + dayDone + '/' + day.tasks.length + '</span>';
      html += '</div>';
      html += '<div class="day-tasks' + (openDays[dayKey] ? ' open' : '') + '" id="db_' + safeKey + '">';

      day.tasks.forEach(function(task, ti) {
        const key = ph.id + '_' + day.d + '_' + ti;
        const done = state[key] || false;
        html += '<div class="task' + (done ? ' done' : '') + '">';
        html += '<input type="checkbox" id="' + key + '"' + (done ? ' checked' : '') + ' onchange="toggleTask(\'' + key + '\')">';
        html += '<label for="' + key + '"><span class="badge badge-' + task.r + '">' + task.r + '</span>' + task.t + '</label>';
        html += '</div>';
      });

      html += '</div></div>';
    });

    html += '</div></div>';
  });

  container.innerHTML = html;
  updateSummary();
}

render();
</script>
</body>
</html>
